<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor de PDF</title>
  <link rel="stylesheet" href="../navbar.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #eef2f7;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #0f766e;
      --accent-2: #2563eb;
      --border: #e2e8f0;
    }

    body {
      font-family: Inter, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .site-header {
      flex-shrink: 0;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }

    main {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 0;
    }

    #uploadSection {
      padding: 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    #uploadSection input[type="file"],
    #uploadSection button {
      padding: 0.5rem 1rem;
      margin-right: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      font-size: 0.875rem;
      cursor: pointer;
    }

    #uploadSection button {
      background: var(--accent-2);
      color: white;
      border: none;
    }

    #uploadSection button:hover {
      background: #1d4ed8;
    }

    #uploadError {
      color: #dc2626;
      margin-top: 0.5rem;
      font-size: 0.875rem;
    }

    #editorContainer {
      display: none;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      border-right: 1px solid var(--border);
      padding-right: 1rem;
    }

    .toolbar-group:last-child {
      border-right: none;
      padding-right: 0;
    }

    .toolbar button,
    .toolbar select,
    .toolbar input[type="color"],
    .toolbar input[type="range"] {
      padding: 0.5rem 0.75rem;
      background: var(--accent-2);
      color: white;
      border: 1px solid var(--accent-2);
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.75rem;
    }

    .toolbar select {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .toolbar input[type="color"] {
      width: 40px;
      height: 32px;
    }

    .toolbar input[type="range"] {
      width: 100px;
    }

    .toolbar button:hover {
      background: #1d4ed8;
    }

    .toolbar button:disabled {
      background: var(--muted);
      cursor: not-allowed;
    }

    .toolbar label {
      font-size: 0.75rem;
      color: var(--text);
    }

    .viewer-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: var(--bg);
      overflow: auto;
      padding: 1rem;
    }

    .pdf-page-wrapper {
      position: relative;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    #pdfCanvas {
      display: block;
    }

    #annotationCanvas {
      position: absolute;
      top: 0;
      left: 0;
      cursor: crosshair;
      z-index: 10;
    }

    .status-bar {
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .annotations-list {
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 1rem;
      max-height: 150px;
      overflow-y: auto;
      flex-shrink: 0;
      display: none;
    }

    .annotations-list.active {
      display: block;
    }

    .annotation-item {
      background: var(--bg);
      padding: 0.5rem;
      margin-bottom: 0.5rem;
      border-left: 3px solid var(--accent-2);
      border-radius: 0.25rem;
      font-size: 0.75rem;
    }

    #extractedText {
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 1rem;
      max-height: 200px;
      overflow-y: auto;
      flex-shrink: 0;
      display: none;
    }

    #extractedText.active {
      display: block;
    }

    #textContent {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    #extractedText button {
      padding: 0.5rem 1rem;
      background: var(--accent-2);
      color: white;
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.75rem;
    }

    #extractedText button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="logo" href="../index.html">DevTools</a>
      <nav class="site-nav">
        <a class="nav-link" href="../apoyo.html">Apoyanos</a>
        <a class="nav-link" href="../ayuda.html">Enlaces</a>
      </nav>
    </div>
  </header>

  <main>
    <div id="uploadSection">
      <a href="../index.html" style="display: inline-block; margin-bottom: 1rem; margin-right: 1rem; padding: 0.5rem 1rem; background: var(--accent); color: white; border-radius: 0.375rem; text-decoration: none;">← Volver</a>
      <input type="file" id="pdfFile" accept="application/pdf" />
      <button id="loadPdfBtn">Cargar PDF</button>
      <div id="uploadError"></div>
    </div>

    <div id="editorContainer">
      <div class="toolbar">
        <div class="toolbar-group">
          <select id="toolSelect">
            <option value="select">Sin herramienta</option>
            <option value="pen">Bolígrafo</option>
            <option value="highlight">Highlighter</option>
            <option value="text">Texto</option>
            <option value="line">Línea</option>
            <option value="rectangle">Rectángulo</option>
            <option value="circle">Círculo</option>
          </select>
        </div>

        <div class="toolbar-group">
          <label>Color:</label>
          <input type="color" id="colorPicker" value="#ff0000" />
          <label>Tamaño:</label>
          <input type="range" id="brushSize" min="1" max="20" value="3" />
        </div>

        <div class="toolbar-group">
          <button id="undoBtn">Deshacer</button>
          <button id="clearCanvasBtn">Limpiar</button>
          <button id="downloadPdfBtn">Descargar</button>
        </div>

        <div class="toolbar-group">
          <button id="prevPageBtn">◀ Anterior</button>
          <input type="number" id="pageInput" min="1" value="1" style="width: 50px;" />
          <span id="pageInfo">de 1</span>
          <button id="nextPageBtn">Siguiente ▶</button>
        </div>

        <div class="toolbar-group">
          <button id="rotateLeftBtn">Girar ↻</button>
          <button id="rotateRightBtn">Girar ↺</button>
          <button id="extractTextBtn">Extraer texto</button>
        </div>
      </div>

      <div class="viewer-container">
        <div class="pdf-page-wrapper" id="pdfPageWrapper">
          <canvas id="pdfCanvas"></canvas>
          <canvas id="annotationCanvas"></canvas>
        </div>
      </div>

      <div class="annotations-list" id="annotationsList">
        <strong>Anotaciones:</strong>
        <div id="annotationsListContainer"></div>
      </div>

      <div id="extractedText">
        <strong>Texto extraído:</strong>
        <pre id="textContent"></pre>
        <button id="copyTextBtn">Copiar</button>
      </div>

      <div class="status-bar">
        <span id="statusMessage">PDF cargado</span>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
