<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel a PDF</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../navbar.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="logo" href="../index.html">DevTools</a>
      <nav class="site-nav">
        <a class="nav-link" href="../apoyo.html">Apoyo</a>
        <a class="nav-link" href="../ayuda.html">Ayuda</a>
      </nav>
    </div>
  </header>

  <main>
    <h1>Excel a PDF</h1>
    <p>Convierte hojas de cálculo Excel (.xlsx, .xls) a PDF de forma rápida y sencilla.</p>

    <label for="excelFile">Selecciona un archivo Excel</label><br />
    <input type="file" id="excelFile" accept=".xlsx,.xls,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" />

    <button id="convertBtn" disabled>Convertir a PDF</button>
    <button id="downloadBtn" disabled>Descargar PDF</button>

    <div id="status" style="margin-top:0.75rem; color:#111;"></div>
    <div id="error" style="color:#b91c1c; margin-top:0.75rem;"></div>

    <p style="margin-top:1rem; padding:0.75rem; background-color:#f3f4f6; border-radius:0.5rem; text-align:center; font-size:0.875rem;">
      ¿Te ahorró tiempo? ¡Un café nos viene bien a ambos! ☕😄
    </p>

    <p><a href="../index.html">Volver</a></p>
  </main>

  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script>
    const excelFile = document.getElementById('excelFile');
    const convertBtn = document.getElementById('convertBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');

    let generatedPdf = null;

    excelFile.addEventListener('change', () => {
      convertBtn.disabled = !excelFile.files.length;
      downloadBtn.disabled = true;
      generatedPdf = null;
      statusEl.textContent = '';
      errorEl.textContent = '';
    });

    function parseExcelFile(fileArrayBuffer) {
      try {
        const workbook = XLSX.read(fileArrayBuffer, { type: 'array' });
        const sheets = [];

        workbook.SheetNames.forEach(sheetName => {
          const worksheet = workbook.Sheets[sheetName];
          const data = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
          sheets.push({ name: sheetName, data });
        });

        return sheets;
      } catch (err) {
        throw new Error(`Error al leer Excel: ${err.message}`);
      }
    }

    convertBtn.addEventListener('click', () => {
      if (!excelFile.files.length) return;

      errorEl.textContent = '';
      statusEl.textContent = 'Procesando archivo Excel...';
      convertBtn.disabled = true;
      downloadBtn.disabled = true;
      generatedPdf = null;

      const file = excelFile.files[0];
      const reader = new FileReader();

      reader.onload = async event => {
        try {
          const buffer = event.target.result;
          const sheets = parseExcelFile(buffer);

          if (!sheets.length || !sheets[0].data.length) {
            throw new Error('El archivo Excel está vacío.');
          }

          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({
            orientation: 'landscape',
            unit: 'mm',
            format: 'a4'
          });

          let firstSheet = true;
          let totalRows = 0;

          sheets.forEach(sheet => {
            if (!sheet.data.length) return;

            if (!firstSheet) {
              doc.addPage();
            }
            firstSheet = false;

            // Título de la hoja
            doc.setFontSize(14);
            doc.text(sheet.name, 15, 15);

            // Preparar datos para autoTable
            const tableData = sheet.data.map(row =>
              row.map(cell =>
                typeof cell === 'object' && cell !== null
                  ? JSON.stringify(cell)
                  : (cell === undefined || cell === null ? '' : String(cell))
              )
            );

            // Usar autoTable
            doc.autoTable({
              head: [tableData[0] || []],
              body: tableData.slice(1),
              startY: 25,
              margin: { top: 10, bottom: 10, left: 10, right: 10 },
              styles: {
                fontSize: 10,
                cellPadding: 3,
                halign: 'left',
                valign: 'middle',
                overflow: 'linebreak'
              },
              headStyles: {
                fillColor: [76, 175, 80],
                textColor: [255, 255, 255],
                fontStyle: 'bold',
                halign: 'left'
              },
              alternateRowStyles: {
                fillColor: [240, 240, 240]
              },
              columnStyles: {
                0: { cellWidth: 'auto' }
              },
              didDrawPage: (data) => {
                // Pie de página con número
                const pageSize = doc.internal.pageSize;
                const pageCount = doc.internal.getNumberOfPages();
                doc.setFontSize(10);
                doc.text(
                  `Página ${pageCount}`,
                  pageSize.getWidth() / 2,
                  pageSize.getHeight() - 10,
                  { align: 'center' }
                );
              }
            });

            totalRows += sheet.data.length;
          });

          generatedPdf = doc;
          statusEl.textContent = `¡Listo! ${sheets.length} hoja(s) convertida(s) (${totalRows} filas en total).`;
          downloadBtn.disabled = false;
        } catch (err) {
          errorEl.textContent = `Error: ${err.message}`;
          statusEl.textContent = '';
        } finally {
          convertBtn.disabled = false;
        }
      };

      reader.onerror = () => {
        errorEl.textContent = 'No se pudo leer el archivo Excel.';
        statusEl.textContent = '';
        convertBtn.disabled = false;
      };

      reader.readAsArrayBuffer(file);
    });

    downloadBtn.addEventListener('click', () => {
      if (!generatedPdf) return;
      const filename = 'export_' + new Date().getTime() + '.pdf';
      generatedPdf.save(filename);
    });
  </script>
</body>
</html>
