<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF a Excel</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <main>
    <h1>PDF a Excel</h1>
    <p>Extrae texto del PDF y conviértelo a una hoja de cálculo XLSX (texto plano).
      Funciona mejor con PDF con texto seleccionable.</p>

    <label for="pdfFile">Selecciona un archivo PDF</label><br />
    <input type="file" id="pdfFile" accept="application/pdf" />

    <button id="convertBtn" disabled>Convertir a XLSX</button>
    <button id="downloadBtn" disabled>Descargar XLSX</button>

    <div id="status" style="margin-top:0.75rem; color:#111;"></div>
    <div id="error" style="color:#b91c1c; margin-top:0.75rem;"></div>

    <p><a href="../index.html">Volver</a></p>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script>
    const pdfFile = document.getElementById('pdfFile');
    const convertBtn = document.getElementById('convertBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');

    let generatedBlob = null;

    pdfFile.addEventListener('change', () => {
      convertBtn.disabled = !pdfFile.files.length;
      downloadBtn.disabled = true;
      generatedBlob = null;
      statusEl.textContent = '';
      errorEl.textContent = '';
    });

    function parsePdfText(fileArrayBuffer) {
      return pdfjsLib.getDocument({ data: fileArrayBuffer }).promise
        .then(pdf => {
          const pagePromises = [];
          for (let i = 1; i <= pdf.numPages; i++) {
            pagePromises.push(pdf.getPage(i).then(page => page.getTextContent()));
          }
          return Promise.all(pagePromises).then(pages => {
            const lines = [];
            pages.forEach((page, pageIndex) => {
              let pageText = '';
              page.items.forEach(item => {
                pageText += item.str;
                if (item.str.endsWith('\n') || item.str.endsWith('\r')) {
                  // no-op; preservo líneas con split depois
                }
              });
              pageText = pageText.replace(/\s+$/g, '');
              const rawLines = pageText.split(/\r?\n|\r/).filter(l => l.trim() !== '');
              rawLines.forEach(l => lines.push(l));
              if (pageIndex < pages.length - 1) {
                lines.push('');
              }
            });
            return lines;
          });
        });
    }

    function makeXlsxFromLines(lines) {
      if (!lines.length) throw new Error('No se encontró contenido texto en el PDF.');

      const aoa = lines.map(line => [line]);
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Hoja1');
      const data = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
      return new Blob([data], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    }

    convertBtn.addEventListener('click', () => {
      if (!pdfFile.files.length) return;

      errorEl.textContent = '';
      statusEl.textContent = 'Analizando PDF, espera...' ;
      convertBtn.disabled = true;
      downloadBtn.disabled = true;
      generatedBlob = null;

      const file = pdfFile.files[0];
      const reader = new FileReader();

      reader.onload = async event => {
        try {
          const buffer = event.target.result;
          const lines = await parsePdfText(buffer);
          generatedBlob = makeXlsxFromLines(lines);

          statusEl.textContent = `¡Listo! Texto extraído (${lines.length} filas).`; 
          downloadBtn.disabled = false;
        } catch (err) {
          errorEl.textContent = `Error al convertir PDF: ${err.message}`;
          statusEl.textContent = '';
        } finally {
          convertBtn.disabled = false;
        }
      };

      reader.onerror = () => {
        errorEl.textContent = 'No se pudo leer el PDF.';
        convertBtn.disabled = false;
      };

      reader.readAsArrayBuffer(file);
    });

    downloadBtn.addEventListener('click', () => {
      if (!generatedBlob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(generatedBlob);
      a.download = 'export.xlsx';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    });
  </script>
</body>
</html>
